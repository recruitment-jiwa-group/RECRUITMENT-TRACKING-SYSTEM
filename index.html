<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Recruitment Database</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow: hidden; /* Mencegah munculnya scroll ganda dari halaman luar */
}
.iframe-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw; /* Menggunakan ukuran pasti dari layar */
    height: 100vh;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block; /* Menghilangkan spasi kosong bawaan elemen iframe */
}
</style>
</head>
<body>
<div class="iframe-container">

<iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbzyOsmvEUcQuankhHq_RjmMslz7a04mtrT-XfVm_ViLzcqza2MxetMZ4F99c1qpWYWS/exec"
    scrolling="yes"
    allowfullscreen="true"
    webkitallowfullscreen="true">
</iframe>

</div>
</body>
</html>
